name: simple_household
description: |
  A household with a checking account, savings account, one credit
  card, and a self-custody crypto wallet. Used as the smoke-test
  fixture for both Python and TS loaders. Includes categorized
  spending transactions (May+June 2026) and one ETH crypto position
  with monthly snapshots (Jan 2025 - May 2026) so Spending and
  Investments screenshots render with content.
as_of: "2026-06-01"

accounts:
  - id: simplefin:chk-1234
    type: checking
    institution: Chase
    display_name: Chase Checking
    mode: live
    active: 1
  - id: simplefin:sav-5678
    type: savings
    institution: Chase
    display_name: Chase Savings
    mode: live
    active: 1
  - id: simplefin:cc-9999
    type: credit
    institution: Chase
    display_name: Chase Sapphire
    mode: live
    active: 1
  - id: self-custody:eth-wallet
    type: crypto
    institution: Self-Custody
    display_name: ETH Wallet
    mode: manual
    active: 1

